<div class="auth-page-container">
  <div class="auth-card" style="max-width:540px;">
    <div class="auth-header">
      <h2>Crear Cuenta</h2>
      <p>Regístrate en Patrocinapp para comenzar</p>
    </div>

    <div class="role-selector">
      <button type="button" class="role-tab" [class.active]="role === 'negocio'" (click)="setRole('negocio')">Soy Inversionista / Marca</button>
      <button type="button" class="role-tab" [class.active]="role === 'deportista'" (click)="setRole('deportista')">Soy Deportista</button>
    </div>

    @if (error()) { <div class="alert-box error">{{ error() }}</div> }
    @if (success()) { <div class="alert-box success">{{ success() }}</div> }

    <form (ngSubmit)="submit()">
      @if (role === 'negocio') {
        <div class="form-group">
          <label class="form-label" for="reg-razon">Nombre de la Empresa / Marca</label>
          <input type="text" id="reg-razon" name="razonSocial" class="form-input" placeholder="Nike Inc." required [(ngModel)]="razonSocial" />
        </div>
        <div class="form-group">
          <label class="form-label" for="reg-ruc">RUC</label>
          <input type="text" id="reg-ruc" name="ruc" class="form-input" placeholder="20123456789" required maxlength="11" [(ngModel)]="ruc" />
        </div>
      } @else {
        <div class="form-group">
          <label class="form-label" for="reg-name">Nombre Completo</label>
          <input type="text" id="reg-name" name="nombreCompleto" class="form-input" placeholder="Sofía Rodríguez" required [(ngModel)]="nombreCompleto" />
        </div>
        <div class="form-group">
          <label class="form-label" for="reg-dni">DNI</label>
          <input type="text" id="reg-dni" name="dni" class="form-input" placeholder="12345678" required maxlength="8" [(ngModel)]="dni" />
        </div>
        <div class="form-group">
          <label class="form-label" for="reg-disciplina">Disciplina</label>
          <input type="text" id="reg-disciplina" name="disciplina" class="form-input" placeholder="Atletismo, Ciclismo, Natación..." required [(ngModel)]="disciplina" />
        </div>
        <div class="form-group">
          <label class="form-label" for="reg-bio">Biografía deportiva</label>
          <textarea id="reg-bio" name="biografia" class="form-input form-textarea" placeholder="Describe logros, objetivos y necesidades de patrocinio" required [(ngModel)]="biografia"></textarea>
        </div>
      }

      <div class="form-group">
        <label class="form-label" for="reg-email">Correo Electrónico</label>
        <input type="email" id="reg-email" name="correo" class="form-input" placeholder="contacto@ejemplo.com" required [(ngModel)]="correo" />
      </div>

      <div class="form-group">
        <label class="form-label" for="reg-password">Contraseña</label>
        <input type="password" id="reg-password" name="password" class="form-input" placeholder="Mínimo 6 caracteres" required [(ngModel)]="password" />
      </div>

      <button type="submit" class="btn btn-primary btn-glow btn-block" style="width:100%;" [disabled]="loading()">
        {{ loading() ? 'Registrando...' : 'Crear Cuenta' }}
      </button>
    </form>

    <div class="auth-footer">
      ¿Ya tienes cuenta? <a routerLink="/login" class="btn-link">Inicia sesión</a>
    </div>
  </div>
</div>
