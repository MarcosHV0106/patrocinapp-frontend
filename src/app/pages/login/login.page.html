<div class="auth-page-container">
  <div class="auth-card">
    <div class="auth-header">
      <h2>Iniciar Sesión</h2>
      <p>Ingresa a tu panel de Patrocinapp</p>
    </div>

    @if (error()) {
      <div class="alert-box error">{{ error() }}</div>
    }

    <form (ngSubmit)="submit()">
      <div class="form-group">
        <label class="form-label" for="login-email">Correo Electrónico</label>
        <input type="email" id="login-email" name="correo" class="form-input" placeholder="ejemplo@empresa.com" required autocomplete="email" [disabled]="loading()" [(ngModel)]="correo" />
      </div>

      <div class="form-group">
        <label class="form-label" for="login-password">Contraseña</label>
        <input type="password" id="login-password" name="password" class="form-input" placeholder="••••••••" required autocomplete="current-password" [disabled]="loading()" [(ngModel)]="password" />
      </div>

      <div class="auth-button-wrapper">
        <button type="submit" class="btn btn-primary btn-glow btn-block" style="width:100%;" [disabled]="loading()">
          {{ loading() ? 'Validando...' : 'Acceder a la Plataforma' }}
        </button>
      </div>
    </form>

    <div class="auth-footer">
      ¿No tienes una cuenta? <a routerLink="/registro" class="btn-link">Regístrate ahora</a>
    </div>
  </div>
</div>
